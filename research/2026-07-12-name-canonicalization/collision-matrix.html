let ds = "initiatives", merged = false;
const csel = document.getElementById('cause');
function cur(){ return ALL[ds]; }
function esc(s){return String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
const money = a => '$'+Math.round(a).toLocaleString();

function syncControls(){
  const t = cur().tiers;
  document.querySelectorAll('.tier').forEach((c,i)=>{ c.value=t[i][0]; c.checked=true; document.getElementById('t'+i).textContent=t[i][1]; });
  csel.innerHTML='<option value="">all causes</option>';
  [...new Set(cur().groups.flatMap(g=>g.causes))].sort().forEach(c=>{const o=document.createElement('option');o.value=c;o.textContent=c;csel.appendChild(o);});
  let n = document.getElementById('note'); n.innerHTML = cur().blurb;
  if(ds==='categories' && ALL.renames.length){
    n.innerHTML += ' &nbsp;•&nbsp; <b>Detected rename:</b> ' + ALL.renames.map(r=>esc(r.annotated)+' (formerly '+esc(r.former_name)+')').join('; ') + ' — decide whether Senior Services and Older Adult Services are one longitudinal category or two eras.';
  }
}
function fyHead(fy){return '<th class="lbl">'+(ds==='initiatives'?'initiative':'category')+' / spelling</th>'+fy.map(f=>'<th>'+f.replace('FY',"'")+'</th>').join('');}
function mergeVariants(g){const years=[...new Set(g.variants.flatMap(v=>v.years))];return {spelling:'▸ CANONICAL: '+g.canonical,years,amount:g.combined};}

function render(){
  const q=document.getElementById('q').value.toLowerCase();
  const tiers=[...document.querySelectorAll('.tier:checked')].map(c=>c.value);
  const cause=csel.value, cellMode=document.getElementById('cells').value, fy=cur().fy;
  const app=document.getElementById('app'); app.innerHTML=''; let shown=0,dollars=0;
  cur().groups.forEach(g=>{
    if(!tiers.includes(g.tier)) return;
    if(cause && !g.causes.includes(cause)) return;
    const hay=(g.canonical+' '+g.variants.map(v=>v.spelling).join(' ')).toLowerCase();
    if(q && !hay.includes(q)) return;
    shown++; dollars+=g.combined;
    const div=document.createElement('div'); div.className='group';
    const badges=g.causes.map(c=>'<span class="badge '+(c==='&/AND'?'amp':(c==='rename'?'rename':''))+'">'+c+'</span>').join('')
      +(g.tier!=='mechanical'?'<span class="badge tierreview">'+g.tier+'</span>':'')
      +(g.overlap?'<span class="badge warn">same-year overlap</span>':'')
      +(g.casing_todo?'<span class="badge warn">casing?</span>':'');
    div.innerHTML='<div class="ghead"><span class="gname">'+esc(g.canonical)+'</span>'+badges+'<span class="gamt">'+money(g.combined)+'</span></div>';
    const sc=document.createElement('div'); sc.className='scroll';
    let rows=''; const variants= merged?[mergeVariants(g)]:g.variants;
    variants.forEach(v=>{
      let cells=''; fy.forEach(f=>{const on=v.years.includes(f);
        if(cellMode==='amt') cells+= on?'<td class="hit">'+(v.amount>=1e6?(v.amount/1e6).toFixed(1)+'M':Math.round(v.amount/1e3)+'k')+'</td>':'<td></td>';
        else cells+= on?'<td class="hit">●</td>':'<td></td>';});
      rows+='<tr><td class="lbl"><code>'+esc(v.spelling)+'</code></td>'+cells+'</tr>';});
    sc.innerHTML='<table><thead><tr>'+fyHead(fy)+'</tr></thead><tbody>'+rows+'</tbody></table>';
    div.appendChild(sc); app.appendChild(div);
  });
  document.getElementById('stat').textContent=shown+' groups · '+money(dollars)+' spanned';
}
document.getElementById('switch').addEventListener('click',e=>{
  if(!e.target.dataset.ds) return;
  ds=e.target.dataset.ds; merged=false;
  document.querySelectorAll('#switch button').forEach(b=>b.classList.toggle('on',b.dataset.ds===ds));
  syncControls(); render();
});
['q'].forEach(id=>document.getElementById(id).addEventListener('input',render));
document.querySelectorAll('.tier').forEach(c=>c.addEventListener('change',render));
csel.addEventListener('change',render);
document.getElementById('cells').addEventListener('change',render);
document.getElementById('expand').addEventListener('click',()=>{merged=!merged;render();});
syncControls(); render();
</script></body></html>
