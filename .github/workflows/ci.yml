# CI gate for @betanyc/nyc-budget-mcp (the MCP server in mcp/).
#
# Enforces that the TypeScript build (`npm run build` -> `tsc`) and the test
# suite (`node --test test/*.test.js`) both pass on a clean `npm ci` install,
# across the supported Node range. This catches type errors, dependency drift,
# and data-layer regressions before merge — the same version-safety discipline
# the main workspace's Python tree enforces in engineering-checks.yml (see
# platform/system/engineering-standards.md in BetaNYC_AI_Workspace).
#
# Subdirectory note: the MCP is not the repo root — it lives in mcp/. Every npm
# step runs with working-directory: mcp and the Node cache is keyed on
# mcp/package-lock.json. The `prepare`/`pretest` scripts read ../data/ at build
# time, so the full repo checkout (actions/checkout@v4) is required.
#
# Node matrix: 20.x and 22.x. package.json declares engines "node >= 18", but
# Node 18 reached End-of-Life on 2025-04-30, so the matrix covers only
# actively-maintained LTS releases (20 = floor, 22 = current LTS). This mirrors
# the sibling nyc-checkbook-mcp CI convention. fail-fast is disabled so a break
# on one version still reports the other.

name: CI

on:
  pull_request:
    branches: [main]
    paths:
      - "mcp/**"
      - ".github/workflows/**"
  push:
    branches: [main]
    paths:
      - "mcp/**"
      - ".github/workflows/**"
  # Manual trigger — lets us fire a run on any branch. A path-scoped
  # pull_request/push event does not fire on the very PR that introduces the
  # workflow, so this dispatch is retained as a low-cost on-demand affordance.
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-test:
    name: Build + test (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        node-version:
          - "20.x"
          - "22.x"

    defaults:
      run:
        working-directory: mcp

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"
          cache-dependency-path: mcp/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

  # Merged ≠ shipped guard. Consumers run `npx -y @betanyc/nyc-budget-mcp`, so
  # the npm registry — not main — is what ships. A PR that changes shipped code
  # but leaves mcp/package.json at a version already on the registry would merge
  # "green" yet publish nothing. This job fails such a PR with a bump reminder.
  # PR-only. Runs at repo root (no working-directory default) because it diffs
  # the whole tree and reads mcp/package.json + data/combined by path.
  # Docs/CI-only PRs and PRs outside the shipped paths skip untouched.
  # See platform/system/engineering-standards.md "Release protocol" in the
  # BetaNYC workspace, and BetaNYC/New-York-City-Budget#33.
  version-guard:
    name: Version guard (merged ≠ shipped)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    steps:
      # fetch-depth: 0 so the PR base SHA is present locally for the diff.
      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fail if shipped code changed without a version bump
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          set -euo pipefail
          echo "PR base SHA: $BASE_SHA"
          # Three-dot diff (merge-base..HEAD) restricted to what ships in the
          # npm package: the MCP source/scripts/manifest plus the crosswalk CSVs
          # in data/combined that are baked into the shipped SQLite index. The
          # repo's wider budget-data pipeline outside these paths is excluded.
          CHANGED=$(git diff --name-only "$BASE_SHA...HEAD" -- mcp/src mcp/scripts mcp/package.json data/combined)
          if [ -z "$CHANGED" ]; then
            echo "No shipped files changed (mcp/src, mcp/scripts, mcp/package.json, data/combined) — version guard not applicable. Passing."
            exit 0
          fi
          echo "Shipped files changed in this PR:"
          echo "$CHANGED"
          NAME=$(node -p "require('./mcp/package.json').name")
          CURRENT=$(node -p "require('./mcp/package.json').version")
          echo "Package $NAME, local version $CURRENT"
          # Exact, unauthenticated registry probe. On a hit npm prints the bare
          # version and exits 0; on a miss it errors (E404) with nothing on
          # stdout. Matching the printed string is robust to both — we never
          # rely on the exit code.
          PUBLISHED=$(npm view "$NAME@$CURRENT" version 2>/dev/null || true)
          if [ "$PUBLISHED" = "$CURRENT" ]; then
            echo "::error::$NAME@$CURRENT is already published to npm, but this PR changes shipped code (mcp/src, mcp/scripts, mcp/package.json, or data/combined). Bump the version in mcp/package.json (fix=patch, feature=minor, breaking=major) and add a mcp/CHANGELOG.md entry in the same PR — consumers run 'npx -y', so merging without a bump ships nothing. After merge, push the matching mcp-v<new-version> tag to fire the release workflow."
            exit 1
          fi
          echo "$NAME@$CURRENT is not on the registry yet — version bump present. Guard passes."
